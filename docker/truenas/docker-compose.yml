# Investor OS — TrueNAS 25.10 Deployment (CPU)
#
# ZFS datasets: MainPool/appsdata/investor-os.net/*
# Usage: docker compose up -d

services:
  # PostgreSQL + TimescaleDB + pgvector
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: ios-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-investor}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-investor_os}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - /mnt/MainPool/appsdata/investor-os.net/postgres:/var/lib/postgresql/data
      - ../../migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - ios-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-investor} -d ${DB_NAME:-investor_os}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    shm_size: 256m

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ios-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - /mnt/MainPool/appsdata/investor-os.net/redis:/data
    ports:
      - "6379:6379"
    networks:
      - ios-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Rust API backend
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: ios-api
    environment:
      DATABASE_URL: postgres://${DB_USER:-investor}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-investor_os}
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${RUST_LOG:-info}
      INVESTOR_ENV: ${INVESTOR_ENV:-production}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      PAPER_TRADING: "${PAPER_TRADING:-true}"
      KILL_SWITCH_ENABLED: "true"
      WS_ENABLED: "${WS_ENABLED:-true}"
      WS_DEFAULT_EXCHANGE: binance
      WS_DEFAULT_SYMBOLS: "${WS_DEFAULT_SYMBOLS:-BTCUSDT}"
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - /mnt/MainPool/appsdata/investor-os.net/config:/app/config:ro
      - /mnt/MainPool/appsdata/investor-os.net/logs:/app/logs
      - /mnt/MainPool/appsdata/investor-os.net/models:/app/models:ro
      - /mnt/MainPool/appsdata/investor-os.net/market-data:/app/market-data
    ports:
      - "8080:8080"
    networks:
      - ios-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Next.js frontend
  frontend:
    build:
      context: ../../frontend/investor-dashboard
      dockerfile: Dockerfile
    container_name: ios-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    networks:
      - ios-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  ios-net:
    driver: bridge
