apiVersion: v1
kind: Service
metadata:
  name: hrm-inference
  namespace: investor-os
  labels:
    app: hrm-inference
spec:
  type: ClusterIP
  selector:
    app: hrm-inference
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: hrm-inference-headless
  namespace: investor-os
  labels:
    app: hrm-inference
spec:
  type: ClusterIP
  clusterIP: None  # Headless for pod-to-pod communication
  selector:
    app: hrm-inference
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
