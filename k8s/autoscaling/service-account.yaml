apiVersion: v1
kind: ServiceAccount
metadata:
  name: hrm-service-account
  namespace: investor-os
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hrm-role
  namespace: investor-os
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hrm-role-binding
  namespace: investor-os
subjects:
- kind: ServiceAccount
  name: hrm-service-account
  namespace: investor-os
roleRef:
  kind: Role
  name: hrm-role
  apiGroup: rbac.authorization.k8s.io
