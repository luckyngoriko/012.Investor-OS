# S8-D1: Investor OS API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: investor-api
  namespace: investor-os
  labels:
    app: investor-api
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: investor-api
  template:
    metadata:
      labels:
        app: investor-api
        version: v1.0.0
    spec:
      serviceAccountName: investor-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api
        image: ghcr.io/neurocod/investor-os-api:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info,investor_os=debug"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: redis-url
        - name: RATE_LIMIT_ENABLED
          value: "true"
        - name: PAPER_TRADING
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: paper-trading
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
      - name: tmp
        emptyDir: {}
      terminationGracePeriodSeconds: 30
---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: investor-api
  namespace: investor-os
  labels:
    app: investor-api
spec:
  selector:
    app: investor-api
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: investor-api
  namespace: investor-os
