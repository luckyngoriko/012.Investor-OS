# S8-D1: Secrets (template - do NOT commit real values)
# Use: kubectl create secret generic postgres-secret \
#   --from-literal=username=investor \
#   --from-literal=password=<GENERATED_PASSWORD>
#
# Or use external-secrets with Vault/AWS Secrets Manager

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: investor-os
type: Opaque
stringData:
  username: investor
  password: REPLACE_WITH_GENERATED_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: investor-os
type: Opaque
stringData:
  database-url: "postgres://investor:REPLACE_WITH_PASSWORD@postgres:5432/investor_os"
  redis-url: "redis://redis:6379"
  broker-api-token: "REPLACE_WITH_BROKER_TOKEN"
---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: investor-os
data:
  paper-trading: "true"
  max-orders-per-minute: "100"
  max-position-size: "100000"
  daily-loss-limit: "5000"
