# S8-D1: Kubernetes Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: investor-os
  labels:
    app.kubernetes.io/name: investor-os
    app.kubernetes.io/version: "1.0"
    environment: production
---
# Network Policy for isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: investor-os
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
