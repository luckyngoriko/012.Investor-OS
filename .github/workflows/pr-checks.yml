name: PR Checks

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Test Gate Profile (PR)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Detect optional local dependency
      id: depcheck
      run: |
        if [ -d "/mnt/nas-data/dev/neurocod-rag" ]; then
          echo "skip_rust_checks=false" >> "$GITHUB_OUTPUT"
        else
          echo "skip_rust_checks=true" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Cache cargo
      if: steps.depcheck.outputs.skip_rust_checks == 'false'
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Skip Rust checks when local dependency is unavailable
      if: steps.depcheck.outputs.skip_rust_checks == 'true'
      run: echo "Skipping Rust checks in CI because /mnt/nas-data/dev/neurocod-rag is unavailable."

    - name: G1/G2 - Rust compilation
      if: steps.depcheck.outputs.skip_rust_checks == 'false'
      run: cargo check --all-features
    
    - name: G2 - Rust unit tests
      if: steps.depcheck.outputs.skip_rust_checks == 'false'
      run: cargo test --lib --all-features
    
    - name: G1 - Rust clippy
      if: steps.depcheck.outputs.skip_rust_checks == 'false'
      run: cargo clippy --all-features -- -W clippy::all
    
    - name: G1 - Rust formatting
      if: steps.depcheck.outputs.skip_rust_checks == 'false'
      run: cargo fmt -- --check

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/investor-dashboard/package-lock.json

    - name: Install frontend dependencies
      run: cd frontend/investor-dashboard && npm ci

    - name: G3 - Frontend unit tests
      run: cd frontend/investor-dashboard && npm test

    - name: G3 - Frontend build
      run: cd frontend/investor-dashboard && npm run build

    - name: G4 (smoke) - Frontend critical E2E
      run: |
        cd frontend/investor-dashboard
        npx playwright install --with-deps chromium
        npx playwright test \
          tests/e2e/auth/login.spec.ts \
          tests/e2e/dashboard/dashboard.spec.ts \
          tests/e2e/runtime/runtime-contract.spec.ts \
          --project=chromium

    - name: G4 (smoke) - Runtime contract curl checks (best effort)
      run: ./scripts/runtime_contract_smoke.sh

    - name: G6 - PM governance sync
      run: |
        if [[ -x ./scripts/verify_pm_sync.sh ]]; then
          ./scripts/verify_pm_sync.sh
        else
          echo "verify_pm_sync.sh is unavailable; applying baseline PM sync checks."
          test -f .current_sprint
          test -f sprints/active.toml
          test -f sprints/SPRINT_REGISTRY.yaml
          test -f sprints/BOARD.md
          test -f sprints/reports/PROGRESS_SNAPSHOT.md
        fi

    - name: G6 - PM governance boundaries
      run: |
        if [[ -x ./scripts/verify_pm_boundaries.sh ]]; then
          ./scripts/verify_pm_boundaries.sh
        else
          echo "verify_pm_boundaries.sh is unavailable; skipping boundary script check."
        fi

    - name: G7 - Skills catalog audit (if available)
      shell: bash
      run: |
        if [[ -d "$HOME/.agents/skills" ]]; then
          make skills-audit
        else
          echo "Skipping skills audit: \$HOME/.agents/skills not available in runner."
        fi
    
    - name: Install cargo-audit
      run: cargo install cargo-audit --locked

    - name: G5 - Security audit (blocking)
      run: cargo audit

  build-docker:
    name: Build Docker Image
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: investor-os:pr-${{ github.event.number }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
