# Sprint 49: Distributed HRM Inference
# 3-node HRM cluster with load balancer

version: '3.8'

services:
  # HRM Node 1 (primary)
  hrm-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrm-node-1
    command: ["hrm-node", "--id=node-1", "--port=50051", "--host=0.0.0.0"]
    ports:
      - "50051:50051"
    environment:
      - RUST_LOG=info
    networks:
      - hrm-cluster
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50051/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # HRM Node 2
  hrm-node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrm-node-2
    command: ["hrm-node", "--id=node-2", "--port=50052", "--host=0.0.0.0"]
    ports:
      - "50052:50052"
    environment:
      - RUST_LOG=info
    networks:
      - hrm-cluster
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50052/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # HRM Node 3
  hrm-node-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrm-node-3
    command: ["hrm-node", "--id=node-3", "--port=50053", "--host=0.0.0.0"]
    ports:
      - "50053:50053"
    environment:
      - RUST_LOG=info
    networks:
      - hrm-cluster
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50053/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Load Balancer
  hrm-lb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrm-lb
    command: ["hrm-lb", "--nodes=hrm-node-1:50051,hrm-node-2:50052,hrm-node-3:50053", "--port=8080"]
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    depends_on:
      - hrm-node-1
      - hrm-node-2
      - hrm-node-3
    networks:
      - hrm-cluster

  # Client for testing
  hrm-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrm-client
    command: ["sh", "-c", "sleep 10 && echo 'Testing distributed HRM cluster...'"]
    depends_on:
      - hrm-lb
    networks:
      - hrm-cluster
    profiles:
      - test

networks:
  hrm-cluster:
    driver: bridge
